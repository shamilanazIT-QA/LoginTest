name: loginTest
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  login:
    runs-on: ubuntu_latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest
        eve:
          PYTHONPATH: .




