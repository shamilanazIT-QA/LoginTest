name: loginTest
on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  login:
    runs-on: ubuntu-latest  # Changed _ to - (ubuntu-latest)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pytest
        env:                # Fixed 'eve' to 'env'
          PYTHONPATH: .     # This helps Python find your 'pages' folder


